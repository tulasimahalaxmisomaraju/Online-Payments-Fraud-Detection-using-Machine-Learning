<!DOCTYPE html>
<html>
<head>
    <title>Fraud Prediction</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-box {
            width: 520px;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3c72;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.2s;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #2a5298;
            outline: none;
            box-shadow: 0 0 6px rgba(42,82,152,0.3);
        }

        button {
            background: linear-gradient(90deg, #00c853, #00e676);
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 600px) {
            .form-box {
                width: 95%;
            }
            .row {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>

<div class="form-box">
    <h2>💳 Fraud Transaction Checker</h2>

    <form action="/submit" method="post">

        <div class="row">
            <div>
                <label>Step</label>
                <input type="number" name="step" required>
            </div>

            <div>
                <label>Transaction Type</label>
                <select name="type">
                    <option value="0">CASH_IN</option>
                    <option value="1">CASH_OUT</option>
                    <option value="2">DEBIT</option>
                    <option value="3">PAYMENT</option>
                    <option value="4">TRANSFER</option>
                </select>
            </div>
        </div>

        <label>Amount</label>
        <input type="number" step="any" name="amount" required>

        <div class="row">
            <div>
                <label>Old Balance Org</label>
                <input type="number" step="any" name="oldbalanceOrg" required>
            </div>

            <div>
                <label>New Balance Orig</label>
                <input type="number" step="any" name="newbalanceOrig" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Old Balance Dest</label>
                <input type="number" step="any" name="oldbalanceDest" required>
            </div>

            <div>
                <label>New Balance Dest</label>
                <input type="number" step="any" name="newbalanceDest" required>
            </div>
        </div>

        <label>Is Flagged Fraud (0 or 1)</label>
        <input type="number" name="isFlaggedFraud" required>

        <button type="submit">🚀 Predict Fraud</button>

    </form>
</div>

</body>
</html>
