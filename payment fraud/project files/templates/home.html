<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(30px);}
            to {opacity:1; transform: translateY(0);}
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 50px;
            border-radius: 18px;
            width: 480px;
            max-width: 95%;
            margin: auto;
            box-shadow: 0px 30px 70px rgba(0,0,0,0.4);
        }

        h1 {
            margin: 15px 0 10px;
            font-size: 28px;
        }

        p {
            opacity: 0.9;
            font-size: 15px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 30px;
            background: linear-gradient(90deg, #00c853, #00e676);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.06);
            box-shadow: 0px 12px 30px rgba(0,0,0,0.35);
        }

        .features {
            margin-top: 25px;
        }

        .features span {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 7px 12px;
            border-radius: 20px;
            margin: 6px;
            font-size: 13px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
            opacity: 0.8;
        }

        footer span {
            color: #ff00f7;
            font-weight: bold;
          
       font-size: 18px;
          
            /* text-shadow:
                -2px -2px 0 #fff6f6,
                2px -2px 0 #ffffff,
                -2px 2px 0 #ffffff,
                2px 2px 0 #ffffff,
                -3px 0px 0 #fffcfc,
                3px 0px 0 #ffffff,
                0px -3px 0 #ffffff,
                0px 3px 0 #ffffff; */
        }

        /* SVG animation */
        .shield {
            width: 90px;
            margin: auto;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-8px);}
            100% {transform: translateY(0);}
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <!-- SVG ICON -->
        <svg class="shield" viewBox="0 0 64 64" fill="none">
            <path d="M32 4 L56 12 V28 C56 44 44 54 32 60 C20 54 8 44 8 28 V12 Z"
                  fill="#00e676" opacity="0.9"/>
            <path d="M22 32 L30 40 L44 24"
                  stroke="white" stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
        </svg>

        <h1>AI Fraud Detection System</h1>

        <p>
            Smart machine learning based system that analyzes transaction
            patterns and predicts fraud risk instantly with high accuracy.
        </p>

        <a href="/predict" class="btn">Start Fraud Check →</a>

        <div class="features">
            <span>⚡ Real-time Prediction</span>
            <span>🤖 ML Powered</span>
            <span>📊 Risk Analysis</span>
        </div>

    </div>

</div>

<footer>
    Designed by <span>Tulasi</span> • Fraud Detection Project
</footer>

</body>
</html>
